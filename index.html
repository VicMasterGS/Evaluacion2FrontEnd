<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de colaboradores</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Registro de colaboradores región del Bio Bio</h1>
    </header>

    <div>
        <nav>
            <ul>
                <li>Navbar</li>
            </ul>
        </nav>
    </div>
    <p>
        Por favor complete los datos solicitados. 
    </p>

    <div id="elformulario">

        <form id="formulario"> 
            <label id="Nombre">Nombre: </label>
            <input type="text" id="nombre" name="nombre"><br><br>
    
            <label id="Apellido">Apellido: </label>
            <input type="text" id="apellido" name="apellido"><br><br>
    
            <label id="Cargo">Cargo: </label>
            <input type="text" id="cargo" name="cargo"><br><br>
    
            <label id="Email">Correo corporativo: </label>
            <input type="email" id="email" name="email"><br><br>
    
            <button type="submit">Registrar</button>
    
        </form>
    </div>


    <footer>
        <p>Bio Bio 2026 - Todos los derechos son reservados</p>
    </footer>
    <script src="js/script.js"></script>
    <div id="error"></div>
</body>
</html>
