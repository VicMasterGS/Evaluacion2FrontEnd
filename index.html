<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de colaboradores</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Registro de colaboradores región del BioBío</h1>
    </header>

    <div>
        <nav>
            <ul>
                <li>Inicio</li>
                <li>Registro</li>
                <li>Contacto</li>
            </ul>
        </nav>
    </div>
    <p>
        Por favor complete los datos solicitados. 
    </p>

    <div id="elformulario">

        <form id="formulario"> 
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre"><br><br>
    
            <label for="apellido">Apellido:</label>
            <input type="text" id="apellido" name="apellido"><br><br>
    
            <label for="cargo">Cargo:</label>
            <input type="text" id="cargo" name="cargo"><br><br>
    
            <label for="email">Correo corporativo:</label>
            <input type="email" id="email" name="email"><br><br>
    
            <button type="submit">Registrar</button>
    
        </form>
        <div id="errores" style="color: red;"></div>
    </div>

    <!-- Campo de busqueda -->
    <div id="busqueda">
        <label for="buscar">Buscar por nombre o cargo:</label>
        <input type="text" id="buscar" placeholder="Escriba para buscar...">
    </div>

    <!-- Tabla de colaboradores -->
    <div id="lista-colaboradores">
        <h2>Lista de colaboradores registrados</h2>
        <table id="tabla-colaboradores">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Apellido</th>
                    <th>Cargo</th>
                    <th>Correo</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="tbody-colaboradores">
                <!-- Aqui se agregan los colaboradores -->
            </tbody>
        </table>
    </div>


    <footer>
        <p>BioBío 2026 - Todos los derechos son reservados</p>
    </footer>
    <script src="js/script.js"></script>
</body>
</html>
